name: 振替ナビ Bot

on:
  schedule:
    # 5分ごとに実行（公開リポジトリは無制限）
    - cron: "*/5 * * * *"
  workflow_dispatch:  # 手動実行も可能

# 同時実行を防ぐ（前の実行が終わるまで待機）
concurrency:
  group: furikae-navi-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # 5分以内に必ず終了させる

    permissions:
      contents: write  # state.jsonをコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: ボット実行
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          PWA_BASE_URL: ${{ secrets.PWA_BASE_URL }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: python odpt_x_bot.py

      - name: state.json をコミット（変更があった場合のみ）
        run: |
          git config user.name "furikae-navi-bot"
          git config user.email "bot@furikae-navi.example"
          git add state.json
          # 変更がある場合のみコミット
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
