# GitHub Actions で無料定期実行する設定。
# 配置先: リポジトリの .github/workflows/bot.yml
# 認証情報は Settings > Secrets and variables > Actions に登録する。

name: furikae-navi-bot

on:
  schedule:
    # 5分ごと（GitHub Actions の cron 最短間隔。混雑時は遅延することあり）
    - cron: "*/5 * * * *"
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write           # state.json をコミットして重複投稿を防ぐため

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          PWA_BASE_URL: ${{ secrets.PWA_BASE_URL }}
          DRY_RUN: "false"
        run: python odpt_x_bot.py

      - name: Persist state (重複投稿防止)
        run: |
          git config user.name "furikae-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || echo "no changes"
          git push || echo "nothing to push"
